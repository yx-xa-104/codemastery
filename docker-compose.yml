version: "3.9"

services:
  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
    restart: unless-stopped
    networks:
      - codemastery

  # Next.js Web
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    networks:
      - codemastery

networks:
  codemastery:
    driver: bridge
